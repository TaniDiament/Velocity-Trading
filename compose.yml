    build: .
    environment:
      - SPRING_PROFILES_ACTIVE=position-ui
      - HA_ZOOKEEPER_CONNECT=zookeeper:2181
      - HA_SERVICE_NAME=position-ui
    depends_on:
      zookeeper:
        condition: service_healthy
    deploy:
