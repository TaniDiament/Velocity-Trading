    depends_on:
      zookeeper1:
        condition: service_healthy
      zookeeper2:
        condition: service_healthy
      zookeeper3:
        condition: service_healthy
    deploy:
      replicas: 3

  service-lb:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "18080:18080"
      - "18081:18081"
      - "18082:18082"

  external-publisher:
    image: market-maker
    build: .
    environment:
      - SPRING_PROFILES_ACTIVE=external-publisher
      - EXCHANGE_BASE_URL=http://exchange:8080
      - HA_ZOOKEEPER_CONNECT=zookeeper1:2181,zookeeper2:2181,zookeeper3:2181
    ports:
      - "18083:8080"
    depends_on:
      postgres:
        condition: service_healthy
      exchange-1:
        condition: service_started
    deploy:
      replicas: 1

  market-maker-node-1:
    image: market-maker
    build: .
    environment:
      - SPRING_PROFILES_ACTIVE=market-maker-node,${QUOTE_GENERATOR_PROFILE:-test-quote-generator},fault-injection
      - ZOOKEEPER_CONNECT=zookeeper1:2181,zookeeper2:2181,zookeeper3:2181
      - CLUSTER_ADVERTISE_HOST=market-maker-node-1
      - CLUSTER_NODE_ID=market-maker-node-1
    ports:
      - "8081:8080"
    volumes:
      - ./config/symbols.txt:/config/symbols.txt:ro
    depends_on:
      zookeeper1:
        condition: service_healthy
      zookeeper2:
        condition: service_healthy
      zookeeper3:
        condition: service_healthy
      postgres:
