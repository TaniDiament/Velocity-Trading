  market-maker-node-1:
    image: market-maker
    build: .
    environment:
      - SPRING_PROFILES_ACTIVE=market-maker-node,${QUOTE_GENERATOR_PROFILE:-test-quote-generator}
      - ZOOKEEPER_CONNECT=zookeeper:2181
      - CLUSTER_ADVERTISE_HOST=market-maker-node-1
      - CLUSTER_NODE_ID=market-maker-node-1
    ports:
      - "8081:8080"
    volumes:
      - ./config/symbols.txt:/config/symbols.txt:ro
    depends_on:
      zookeeper:
        condition: service_healthy
      postgres:
        condition: service_healthy

