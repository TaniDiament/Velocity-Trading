services:
  zookeeper1:
    image: zookeeper:3.9
    hostname: zookeeper1
    environment:
      - ZOO_MY_ID=1
      - ZOO_SERVERS=server.1=zookeeper1:2888:3888;2181 server.2=zookeeper2:2888:3888;2181 server.3=zookeeper3:2888:3888;2181
      - ZOO_4LW_COMMANDS_WHITELIST=srvr,ruok,mntr,stat,conf
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 | grep -q imok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  zookeeper2:
    image: zookeeper:3.9
    hostname: zookeeper2
    environment:
      - ZOO_MY_ID=2
      - ZOO_SERVERS=server.1=zookeeper1:2888:3888;2181 server.2=zookeeper2:2888:3888;2181 server.3=zookeeper3:2888:3888;2181
      - ZOO_4LW_COMMANDS_WHITELIST=srvr,ruok,mntr,stat,conf
    ports:
      - "2182:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 | grep -q imok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  zookeeper3:
    image: zookeeper:3.9
    hostname: zookeeper3
    environment:
      - ZOO_MY_ID=3
      - ZOO_SERVERS=server.1=zookeeper1:2888:3888;2181 server.2=zookeeper2:2888:3888;2181 server.3=zookeeper3:2888:3888;2181
      - ZOO_4LW_COMMANDS_WHITELIST=srvr,ruok,mntr,stat,conf
    ports:
      - "2183:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 | grep -q imok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  postgres:
    image: postgres
    # The compose stack runs ~17 JVMs (3x trading-state, 3x exchange,
    # 3x exposure-reservation, 7x market-maker-node, plus publisher) and
    # every one opens a HikariCP pool against this database. With Postgres'
    # default max_connections=100 the late-starting market-maker-node JVMs
    # crash on boot with "FATAL: sorry, too many clients already". Bump
    # the limit so the full stack can converge.
    command: ["postgres", "-c", "max_connections=300"]
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=marketmaker
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d marketmaker"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ------------------------------------------------------------------
  # Hazelcast cluster: trading-state, exchange, exposure-reservation each
  # run as 3 explicit replicas. Each replica needs a distinct hostname
  # because Hazelcast uses the advertise host as member identity — sharing
  # one hostname across replicas causes a perpetual split-brain. Replicas
  # share a network alias so other services can still reach the role by
  # the bare name (DNS round-robins across all 3 IPs).
  # ------------------------------------------------------------------
  trading-state-1:
    image: market-maker
    build: .
    hostname: trading-state-1
    networks:
      default:
        aliases:
          - trading-state
    environment:
      - SPRING_PROFILES_ACTIVE=trading-state
      - HA_ZOOKEEPER_CONNECT=zookeeper1:2181,zookeeper2:2181,zookeeper3:2181
      - HA_ADVERTISE_HOST=trading-state-1
      - HAZELCAST_MEMBERS=trading-state-1,trading-state-2,trading-state-3,exchange-1,exchange-2,exchange-3,exposure-reservation-1,exposure-reservation-2,exposure-reservation-3
    depends_on:
      postgres: { condition: service_healthy }
      zookeeper1: { condition: service_healthy }
      zookeeper2: { condition: service_healthy }
      zookeeper3: { condition: service_healthy }

  trading-state-2:
    image: market-maker
    build: .
    hostname: trading-state-2
    networks:
      default:
        aliases:
          - trading-state
    environment:
      - SPRING_PROFILES_ACTIVE=trading-state
      - HA_ZOOKEEPER_CONNECT=zookeeper1:2181,zookeeper2:2181,zookeeper3:2181
      - HA_ADVERTISE_HOST=trading-state-2
      - HAZELCAST_MEMBERS=trading-state-1,trading-state-2,trading-state-3,exchange-1,exchange-2,exchange-3,exposure-reservation-1,exposure-reservation-2,exposure-reservation-3
    depends_on:
      postgres: { condition: service_healthy }
      zookeeper1: { condition: service_healthy }
      zookeeper2: { condition: service_healthy }
      zookeeper3: { condition: service_healthy }

  trading-state-3:
    image: market-maker
    build: .
    hostname: trading-state-3
    networks:
      default:
        aliases:
          - trading-state
    environment:
