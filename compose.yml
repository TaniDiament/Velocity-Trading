services:
  zookeeper:
    image: zookeeper:3.9
    environment:
      - ZOO_4LW_COMMANDS_WHITELIST=mntr,srvr,ruok,stat
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 | grep imok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  postgres:
    image: postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=marketmaker
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d marketmaker"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  trading-state:
    image: market-maker
    build: .
    environment:
      - SPRING_PROFILES_ACTIVE=trading-state
      - HA_ZOOKEEPER_CONNECT=zookeeper:2181
      - HA_SERVICE_NAME=trading-state
    depends_on:
      postgres:
        condition: service_healthy
      zookeeper:
        condition: service_healthy
    deploy:
      replicas: 3

  exchange:
    image: market-maker
    build: .
    environment:
      - SPRING_PROFILES_ACTIVE=exchange
      - HA_ZOOKEEPER_CONNECT=zookeeper:2181
      - HA_SERVICE_NAME=exchange
    depends_on:
      postgres:
        condition: service_healthy
      zookeeper:
        condition: service_healthy
    deploy:
      replicas: 3

  exposure-reservation:
    image: market-maker
    build: .
    environment:
      - SPRING_PROFILES_ACTIVE=exposure-reservation
      - HA_ZOOKEEPER_CONNECT=zookeeper:2181
