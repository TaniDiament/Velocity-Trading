apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mm
  namespace: market-maker
spec:
  serviceName: mm-hs
  replicas: 7
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: mm
  template:
    metadata:
      labels:
        app: mm
    spec:
      affinity:
        # Spread MM pods across cluster nodes when possible (best-effort).
        # Honors the symbol-sharding rule: each ticker on exactly one MM node.
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: mm
                topologyKey: kubernetes.io/hostname
      initContainers:
        # Block startup until ZK quorum is reachable. Without this the mm app
        # races zk-0/1/2 (both StatefulSets use podManagementPolicy: Parallel)
        # and CrashLoops until kubelet backoff happens to land after election.
        - name: wait-for-zk
          image: rancher/mirrored-library-busybox:1.37.0
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              for host in zk-0.zk-hs zk-1.zk-hs zk-2.zk-hs; do
                until [ "$(echo ruok | nc -w 2 $host 2181 2>/dev/null)" = "imok" ]; do
                  echo "waiting for $host:2181"
                  sleep 2
                done
              done
        # Block startup until postgres accepts TCP. JPA services fail-fast on
        # first connect; without this they CrashLoop until the PVC binds and
        # postgres becomes Ready.
        - name: wait-for-postgres
          image: rancher/mirrored-library-busybox:1.37.0
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              until nc -z -w 2 postgres 5432; do
                echo "waiting for postgres:5432"
                sleep 2
              done
      containers:
        - name: app
          image: market-maker:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - { containerPort: 8080 }
            - { containerPort: 7001 }
            - { containerPort: 5701 }
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: SPRING_PROFILES_ACTIVE
              # fault-injection is a test-only profile. Including it here
              # only registers FaultInjector + FaultInjectionController as
              # beans; the hook stays disarmed (no-op) until the error-case
              # 10 integration test explicitly POSTs to /test/fault-injection.
              value: "market-maker-node,production-quote-generator,fault-injection"
            - name: ZOOKEEPER_CONNECT
              value: "zk-0.zk-hs:2181,zk-1.zk-hs:2181,zk-2.zk-hs:2181"
            # Pod-stable DNS used by peers to open the leader->worker forward.
            - name: CLUSTER_ADVERTISE_HOST
              value: "$(POD_NAME).mm-hs.market-maker.svc.cluster.local"
            # Stable cluster id keyed off the StatefulSet pod name. Survives
            # ZK session loss because Curator's PersistentNode recreates the
            # member znode at the same path on reconnect.
            - name: CLUSTER_NODE_ID
              value: "$(POD_NAME)"
            - name: HAZELCAST_MEMBERS
              valueFrom:
                configMapKeyRef:
                  name: hazelcast-members
                  key: members
          volumeMounts:
            - name: symbols
              mountPath: /config
              readOnly: true
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8080 }
            initialDelaySeconds: 25
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8080 }
            initialDelaySeconds: 90
            periodSeconds: 10
      volumes:
        - name: symbols
          configMap:
            name: symbols
            items:
              - key: symbols.txt
                path: symbols.txt