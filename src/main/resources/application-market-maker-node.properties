# Market-Maker Node Configuration
spring.application.name=market-maker-node
server.port=8080


# Market-making configuration
# Symbols are now distributed by the cluster coordinator; the seed list lives in /config/symbols.txt
marketmaker.quote-refresh-interval-ms=1000
marketmaker.spread-bps=10

# Cluster / ZooKeeper coordination
cluster.zookeeper-connect=${ZOOKEEPER_CONNECT:zookeeper:2181}
cluster.zk-base-path=/marketmaker
cluster.symbols-seed-file=/config/symbols.txt
cluster.session-timeout-ms=10000
cluster.connection-timeout-ms=5000
# Hostname peers use to open the leader->worker TCP forward connection.
# In Docker compose, set CLUSTER_ADVERTISE_HOST to the service name.
cluster.advertise-host=${CLUSTER_ADVERTISE_HOST:localhost}
cluster.forward-port=${CLUSTER_FORWARD_PORT:7001}
# Stable per-instance id (e.g. "mm-3" in k8s, "market-maker-node-1" in compose).
# When blank, falls back to ephemeral-sequential — only suitable for unit tests.
cluster.node-id=${CLUSTER_NODE_ID:}

# Logging
logging.level.edu.yu.marketmaker=DEBUG
logging.level.root=INFO

# Health check endpoint
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

# RSocket calls to exposure-reservation are routed through
# LeaderAwareRSocketClient (ZK service registry); no static host/port needed.

# Quote generation defaults
marketmaker.default-quote-quantity=10
marketmaker.target-spread=0.10
